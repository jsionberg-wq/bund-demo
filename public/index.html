function normalizeText(value) {
  return String(value || "").trim().toLowerCase();
}
function priceToNumber(value) {
  const num = parseFloat(String(value).replace(",", ".").replace(/[^\d.-]/g, "").split("-")[0]);
  return Number.isFinite(num) ? num : 0;
}
function dedupeProducts(list) {
  const seen = new Set();
  return list.filter((item) => {
    const key = normalizeText(item.name);
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function tryParseJson(text) {
  try {
    const cleaned = String(text || "").trim();
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (!match) return null;
    return JSON.parse(match[0]);
  } catch { return null; }
}

function parseBold(text) {
  var parts = text.split("**");
  return parts.map(function(p, pi) {
    if (pi % 2 === 1) return "<strong>" + p + "</strong>";
    return p;
  }).join("");
}

function parseProducts(reply) {
  var parsed = [];
  var lines = reply.split("\n");
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.indexOf("**") === -1) continue;
    var b1 = line.indexOf("**");
    var b2 = line.indexOf("**", b1 + 2);
    if (b1 < 0 || b2 < 0) continue;
    var bold = line.slice(b1 + 2, b2);
    var dash = -1;
    for (var c = 0; c < bold.length; c++) {
      if (bold[c] === "-" || bold[c] === "\u2014" || bold[c] === "\u2013") { dash = c; break; }
    }
    if (dash < 2) continue;
    var name = bold.slice(0, dash).trim();
    var rest = bold.slice(dash + 1).trim();
    var eur = rest.indexOf("€");
    var price = eur >= 0 ? rest.slice(eur + 1).trim().split(" ")[0] : rest.split(" ")[0];
    if (name.length > 2) parsed.push({ name: name, price: price, id: Math.random() });
  }
  return parsed;
}


function parseBudget(query) {
  const text = String(query || "").toLowerCase();
  const patterns = [/under\s*€?\s*(\d+)/i,/below\s*€?\s*(\d+)/i,/up to\s*€?\s*(\d+)/i,/max\s*€?\s*(\d+)/i,/budget\s*€?\s*(\d+)/i,/до\s*€?\s*(\d+)/i,/до\s*(\d+)\s*евро/i];
  for (const pattern of patterns) { const match = text.match(pattern); if (match) return Number(match[1]); }
  return null;
}

function detectCategories(query) {
  const text = normalizeText(query);
  const dictionary = {
    bathroom:["bathroom","bath","shower","toilet","ванн","душ","туалет"],
    kitchen:["kitchen","oven","fridge","dishwasher","кухн","холодиль","посудом"],
    garden:["garden","outdoor","yard","plants","сад","газон","огород"],
    tools:["tool","drill","saw","diy","инстру","дрель","пила"],
    furniture:["furniture","desk","chair","table","wardrobe","мебел","стол","стул","шкаф"],
    lighting:["light","lamp","bulb","lighting","свет","ламп"],
    flooring:["floor","laminate","tile","vinyl","пол","ламинат","плитк"],
    paints:["paint","primer","wallpaper","краск","обои","грунт"],
    electrical:["electrical","socket","cable","breaker","smart socket","электр","розет","кабель"],
    plumbing:["plumbing","pipe","mixer","tray","сантех","труба","смесител"],
    security:["security","camera","lock","detector","doorbell","безопас","камера","замок"],
    family:["baby","child","family","safety gate","ребен","дет","семь"],
  };
  return Object.keys(dictionary).filter((cat) => dictionary[cat].some((term) => text.includes(term)));
}

function buildCandidatePool(query, excludedNames = [], limit = 18) {
  const excluded = new Set(excludedNames.map(normalizeText));
  const budget = parseBudget(query);
  const detectedCategories = detectCategories(query);
  const words = normalizeText(query).split(/\s+/).filter((w) => w.length > 2);
  return products
    .filter((product) => !excluded.has(normalizeText(product.name)))
    .map((product) => {
      const haystack = [product.name,product.cat,product.note].concat(product.tags).join(" ").toLowerCase();
      let score = 0;
      for (const word of words) {
        if (product.name.toLowerCase().includes(word)) score += 6;
        if (product.tags.some((tag) => tag.toLowerCase().includes(word))) score += 4;
        if (product.cat.toLowerCase().includes(word)) score += 3;
        if (haystack.includes(word)) score += 1;
      }
      if (detectedCategories.length > 0 && detectedCategories.includes(product.cat)) score += 12;
      if (product.kind === "bundle" && /bundle|starter|complete|kit|set|комплект|набор/.test(normalizeText(query))) score += 8;
      if (budget !== null) {
        const price = priceToNumber(product.price);
        if (price <= budget) score += 6;
        else if (price <= budget * 1.2) score += 2;
        else score -= 8;
      }
      return { ...product, score };
    })
    .filter((product) => product.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, limit)
    .map(({ score, ...rest }) => rest);
}

function pickCatalogProductsByIds(selectedIds, candidatePool, fallbackQuery) {
  const idMap = new Map(candidatePool.map((item) => [String(item.id), item]));
  const selected = (selectedIds || []).map((id) => idMap.get(String(id))).filter(Boolean);
  if (selected.length > 0) return dedupeProducts(selected);
  return dedupeProducts(buildCandidatePool(fallbackQuery, [], 6).slice(0, 6));
}

    var num = parseFloat(String(p.price).replace(",", ".").split("-")[0]);

    return true;
  });
  var bundleName = topic.length > 40 ? topic.slice(0, 40) + "..." : topic;
  bundleName = bundleName.charAt(0).toUpperCase() + bundleName.slice(1) + " Bundle";
  return {
    name: bundleName,
    items: validItems.map(function(p, i) { return { id: i, name: p.name, price: p.price }; }),
    totalPrice: totalPrice > 0 ? totalPrice.toFixed(0) : "—",

}

    try {
      const existingNames = displayedProducts.map((item) => item.name);
      const existingNameSet = new Set(existingNames.map(normalizeText));
      const candidatePool = buildCandidatePool(lastUserMsg.current, existingNames, 18);
      if (candidatePool.length === 0) return;
      const data = await callChatApi({
        mode: "catalog-select-more",
        system: SYSTEM,
        userMessage: lastUserMsg.current,
        existingNames,
        candidatePool: candidatePool.map((item) => ({ id: item.id, name: item.name, price: item.price, cat: item.cat, kind: item.kind, tags: item.tags, note: item.note })),
      });
      const parsedJson = tryParseJson(data?.text);
      const selectedIds = Array.isArray(parsedJson?.selected_ids) ? parsedJson.selected_ids : [];
      const selected = pickCatalogProductsByIds(selectedIds, candidatePool, lastUserMsg.current)
        .filter((item) => !existingNameSet.has(normalizeText(item.name)));
      setExtraProducts((prev) => dedupeProducts([...prev, ...selected]).slice(0, 18));
    } catch {
      const fallback = buildCandidatePool(lastUserMsg.current, displayedProducts.map((item) => item.name), 6);
      setExtraProducts((prev) => dedupeProducts([...prev, ...fallback]).slice(0, 18));
    } finally {
      setLoadingMore(false);
    }
  }

  async function send() {
    const msg = input.trim();
    if (!msg || loading) return;
    lastUserMsg.current = msg;
    setInput("");
    setExtraProducts([]);
    const newMsgs = [...messages, { role: "user", content: msg }];
    setMessages(newMsgs);
    setLoading(true);
    try {
      const filtered = newMsgs.filter((m) => m.content !== "WELCOME");
      const apiMsgs = filtered.slice(-6).map((m) => ({ role: m.role, content: m.content }));
      const candidatePool = buildCandidatePool(msg, [], 18);
      if (candidatePool.length === 0) throw new Error("No candidate products found");
      const data = await callChatApi({
        mode: "catalog-select",
        system: SYSTEM,
        messages: apiMsgs,
        userMessage: msg,
        candidatePool: candidatePool.map((item) => ({ id: item.id, name: item.name, price: item.price, cat: item.cat, kind: item.kind, tags: item.tags, note: item.note })),
      });
      const parsedJson = tryParseJson(data?.text);
      const selectedIds = Array.isArray(parsedJson?.selected_ids) ? parsedJson.selected_ids : [];
      const selected = pickCatalogProductsByIds(selectedIds, candidatePool, msg);
      const assistantText = formatAssistantReply(selected, parsedJson?.follow_up);
      setMessages((prev) => [...prev, { role: "assistant", content: assistantText }]);
      setAiProducts(selected);
      setActiveBundle(buildBundle(selected, msg));
    } catch {
      const fallback = buildCandidatePool(msg, [], 6);
      if (fallback.length > 0) {
        setMessages((prev) => [...prev, { role: "assistant", content: formatAssistantReply(fallback) }]);
        setAiProducts(fallback);
        setActiveBundle(buildBundle(fallback, msg));
      } else {
        setMessages((prev) => [...prev, { role: "assistant", content: "Sorry, I could not find matching products in the catalog. Try adding room type, budget, or style." }]);
      }
    } finally {
      setLoading(false);
    }
  }

  var RED = "#CC0000";
  var BG = "#FFFFFF";
  var SURF = "#F5F5F5";
  var BORDER = "#E0E0E0";
  var TEXT = "#1A1A1A";
  var MUTED = "#666666";

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: BG, fontFamily: "Arial, sans-serif", color: TEXT }}>
      <style>{"@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } } @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} } * { box-sizing:border-box; margin:0; padding:0; } ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}"}</style>

      {/* HEADER */}
      <div style={{ background: BG, borderBottom: "2px solid " + RED, flexShrink: 0 }}>
        <div style={{ padding: "10px 20px", display: "flex", alignItems: "center", gap: 16, justifyContent: "space-between" }}>
          <div style={{ background: RED, color: BG, fontWeight: 900, fontSize: 22, padding: "4px 12px", letterSpacing: 2 }}>DEPO</div>
              <div style={{ background: "#FFF3CD", color: "#856404", fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, border: "1px solid #ffc107", letterSpacing: 1 }}>DEMO</div>
          <div style={{ flex: 1, maxWidth: 500, display: "flex" }}>
            <input placeholder="Search by name or barcode..." style={{ flex: 1, border: "1px solid " + BORDER, borderRight: "none", borderRadius: "4px 0 0 4px", padding: "8px 14px", fontSize: 13, outline: "none" }} />
            <button style={{ background: RED, color: BG, border: "none", borderRadius: "0 4px 4px 0", padding: "8px 16px", cursor: "pointer", fontSize: 16 }}>&#9901;</button>
          </div>
          <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
            {isMobile && (
              <button onClick={function() { setShowChat(function(v) { return !v; }); }} style={{ background: showChat ? RED : SURF, color: showChat ? BG : TEXT, border: "1px solid " + BORDER, borderRadius: 8, padding: "6px 12px", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>AI Chat</button>
            )}
            <div style={{ fontSize: 11, color: MUTED, textAlign: "center", cursor: "pointer" }}>
              <div style={{ fontSize: 18 }}>&#9825;</div>Wishlist
            </div>
            <div style={{ fontSize: 11, color: MUTED, textAlign: "center", cursor: "pointer" }}>
              <div style={{ fontSize: 18 }}>&#128100;</div>Sign in
            </div>
            <div onClick={function() { setCartCount(function(n) { return n + 1; }); }} style={{ fontSize: 11, color: MUTED, textAlign: "center", cursor: "pointer", position: "relative" }}>
              <div style={{ fontSize: 18 }}>&#128722;</div>Cart
              {cartCount > 0 && <div style={{ position: "absolute", top: -4, right: -6, background: RED, color: BG, borderRadius: "50%", width: 16, height: 16, fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>{cartCount}</div>}
            </div>
          </div>
        </div>
        <div style={{ padding: "6px 20px", background: "#F8F8F8", borderTop: "1px solid " + BORDER, fontSize: 13, color: MUTED }}>
          &#128205; Veskiposti 1, Tallinn, Estonia &nbsp; <span style={{ color: RED, cursor: "pointer" }}>Change store</span>
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* LEFT PANEL */}
        {(!isMobile || !showChat) && (
          <LeftPanel
            aiProducts={aiProducts.concat(extraProducts)}
            activeBundle={activeBundle}
            loadingMore={loadingMore}
            isMobile={isMobile}
            RED={RED} BG={BG} SURF={SURF} BORDER={BORDER} TEXT={TEXT} MUTED={MUTED}
            onBack={function() { setAiProducts([]); setActiveBundle(null); setExtraProducts([]); }}
            onAdd={function() { setCartCount(function(n) { return n + 1; }); }}
            onAddBundle={function(items) { setCartCount(function(n) { return n + items.length; }); setActiveBundle(null); }}
            onShowMore={showMore}
          />
        )}

        {/* RIGHT: AI CHAT */}
        {(!isMobile || showChat) && (
          <div style={{ width: isMobile ? "100%" : 400, borderLeft: "1px solid " + BORDER, display: "flex", flexDirection: "column", flexShrink: 0 }}>

            {/* Chat header */}
            <div style={{ padding: "14px 16px", borderBottom: "1px solid " + BORDER }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 3 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#16A34A" }}></div>
                  <span style={{ fontSize: 14, fontWeight: 700, color: TEXT }}>BUND AI Assistant</span>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  {isMobile && <button onClick={function() { setShowChat(false); }} style={{ background: "transparent", border: "1px solid " + BORDER, borderRadius: 8, padding: "4px 10px", fontSize: 11, cursor: "pointer", color: MUTED }}>x Close</button>}
                  <button onClick={function() { setMessages([{ role: "assistant", content: "WELCOME" }]); setAiProducts([]); setActiveBundle(null); }} style={{ background: "transparent", border: "1px solid " + BORDER, borderRadius: 8, padding: "4px 10px", fontSize: 11, cursor: "pointer", color: MUTED }}>&#8634; Clear</button>
                </div>
              </div>
              <div style={{ fontSize: 12, color: MUTED }}>Describe your project - I will find the right products</div>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: "auto", padding: "14px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
              {messages.map(function(m, i) {
                if (!m.content || m.content.trim() === "") return null;
                if (m.content === "WELCOME") {
                  return (
                    <div key={i} style={{ background: SURF, border: "1px solid " + BORDER, borderRadius: 14, padding: 14 }}>
                      <div style={{ fontWeight: 700, fontSize: 15, color: TEXT, marginBottom: 8 }}>Welcome to BUND AI Assistant!</div>
                      <div style={{ fontSize: 13, color: MUTED, marginBottom: 12, lineHeight: 1.6 }}>I am your AI shopping guide for DEPO. Describe your project and I will find the right products instantly.</div>
                      {[
                        ["&#127968;", "Describe a project", "25m2 living room renovation"],
                        ["&#128269;", "Search by style", "Scandinavian living room, warm tones"],
                        ["&#128176;", "Set a budget", "Garden tools starter kit under €200"],
                        ["&#128230;", "Find a bundle", "Complete shower room bundle"],
                        ["&#11088;", "AI recommendations", "What are the most popular products this month"],
                      ].map(function(row) {
                        return (
                          <div key={row[1]} onClick={function() { setInput(row[2]); }}
                            style={{ display: "flex", gap: 10, alignItems: "flex-start", background: BG, borderRadius: 10, padding: "8px 12px", border: "1px solid " + BORDER, marginBottom: 6, cursor: "pointer" }}>
                            <span style={{ fontSize: 18 }} dangerouslySetInnerHTML={{ __html: row[0] }} />
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 13, color: TEXT }}>{row[1]}</div>
                              <div style={{ fontSize: 11, color: MUTED, marginTop: 1 }}>{row[2]}</div>
                            </div>
                          </div>
                        );
                      })}
                      <div style={{ marginTop: 10, fontSize: 11, color: MUTED, borderTop: "1px solid " + BORDER, paddingTop: 10 }}>Supports Latvian, Lithuanian, Estonian, Russian and English.</div>
                    </div>
                  );
                }
                var isUser = m.role === "user";
                var fb = feedback[i] || {};
                return (
                  <div key={i}>
                    <div style={isUser ? { alignSelf: "flex-end", background: RED, color: BG, borderRadius: "14px 14px 4px 14px", padding: "10px 14px", fontSize: 13, maxWidth: "85%", fontWeight: 500, marginLeft: "auto" } : { background: SURF, border: "1px solid " + BORDER, borderRadius: "14px 14px 14px 4px", padding: "10px 14px", fontSize: 13, lineHeight: 1.6, color: TEXT }}>
                      {isUser ? m.content : (
                        <div>
                          {m.content.split("\n").map(function(line, li) {
                            return <div key={li} style={{ marginBottom: line ? 2 : 5 }} dangerouslySetInnerHTML={{ __html: parseBold(line) || "&nbsp;" }} />;
                          })}
                          {!fb.sent ? (
                            <div style={{ marginTop: 8, borderTop: "1px solid " + BORDER, paddingTop: 8 }}>
                              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                                <span style={{ fontSize: 11, color: MUTED }}>Was this helpful?</span>
                                <button onClick={function() { handleVote(i, "up"); }} style={{ background: fb.vote === "up" ? TEXT : "transparent", color: fb.vote === "up" ? BG : TEXT, border: "1px solid " + (fb.vote === "up" ? TEXT : BORDER), borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Yes</button>
                                <button onClick={function() { handleVote(i, "down"); }} style={{ background: fb.vote === "down" ? TEXT : "transparent", color: fb.vote === "down" ? BG : TEXT, border: "1px solid " + (fb.vote === "down" ? TEXT : BORDER), borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>No</button>
                                {fb.vote && <button onClick={function() { handleSend(i); }} style={{ background: TEXT, color: BG, border: "none", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Send</button>}
                              </div>
                              {fb.vote === "down" && (
                                <textarea value={fb.comment || ""} onChange={function(e) { handleComment(i, e.target.value); }} placeholder="What was wrong? (optional)" rows={2} style={{ marginTop: 6, width: "100%", background: BG, border: "1px solid " + BORDER, borderRadius: 8, padding: "5px 10px", fontSize: 11, color: TEXT, resize: "none", outline: "none" }} />
                              )}
                            </div>
                          ) : (
                            <div style={{ marginTop: 8, fontSize: 11, color: "#16A34A" }}>Thanks for your feedback!</div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
              {loading && (
                <div style={{ background: SURF, border: "1px solid " + BORDER, borderRadius: "14px 14px 14px 4px", padding: "12px 16px", display: "flex", gap: 5, width: 60 }}>
                  {[0, 0.2, 0.4].map(function(d, i) { return <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: RED, animation: "pulse 1s " + d + "s infinite" }} />; })}
                </div>
              )}

              <div ref={chatEnd} />
            </div>

            {/* Input */}
            <div style={{ padding: "10px 14px", borderTop: "1px solid " + BORDER, display: "flex", gap: 8 }}>
              <textarea value={input} onChange={function(e) { setInput(e.target.value); }} onKeyDown={function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder="Describe your project or ask a question..." rows={2}
                style={{ flex: 1, background: SURF, border: "1px solid " + BORDER, borderRadius: 10, padding: "8px 12px", color: TEXT, fontSize: 13, outline: "none", resize: "none" }} />
              <button onClick={send} disabled={!input.trim() || loading}
                style={{ background: input.trim() && !loading ? RED : BORDER, color: BG, border: "none", borderRadius: 10, padding: "8px 16px", fontWeight: 700, fontSize: 16, cursor: input.trim() && !loading ? "pointer" : "default" }}>&#8594;</button>
            </div>
          </div>
        )}
      </div>

      {/* MOBILE NAV */}
      {isMobile && (
        <div style={{ borderTop: "2px solid " + RED, background: BG, display: "flex", flexShrink: 0 }}>
          {[["&#128717;", "Products", false], ["&#129302;", "AI Chat", true]].map(function(tab) {
            var active = tab[2] ? showChat : !showChat;
            return (
              <button key={tab[1]} onClick={function() { setShowChat(tab[2]); }}
                style={{ flex: 1, padding: "10px 0", background: "transparent", border: "none", borderTop: active ? "3px solid " + RED : "3px solid transparent", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <span style={{ fontSize: 20 }} dangerouslySetInnerHTML={{ __html: tab[0] }} />
                <span style={{ fontSize: 11, fontWeight: active ? 700 : 400, color: active ? RED : MUTED }}>{tab[1]}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BundDepo));
  </script>
</body>
</html>
